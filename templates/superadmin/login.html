{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Superadmin Login</title>
  <link rel="stylesheet" href="{% static 'css/superadmin.css' %}">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div style="text-align:center; margin-bottom: 24px;">
        <h1 style="color:#fff; font-size:1.5rem;">Kinder<span style="color:var(--primary);">CRM</span></h1>
        <p style="color:var(--text-secondary); font-size:0.85rem;">Superadmin Panel</p>
      </div>

      {% if error %}
      <div style="background:rgba(239,68,68,0.15); color:#ef4444; padding:10px; border-radius:4px; margin-bottom:16px; font-size:0.85rem;">
        {{ error }}
      </div>
      {% endif %}

      <form action="/superadmin/login/" method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Parol</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">Kirish</button>
      </form>
    </div>
  </div>
</body>
</html>
